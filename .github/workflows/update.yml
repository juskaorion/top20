name: Daily Discord Update

on:
  schedule:
    - cron: '0 4 * * *' # Ajaa automaattisesti klo 4 yöllä UTC
  workflow_dispatch: # Mahdollistaa manuaalisen ajon

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Tämä komento poistaa GitHubin varoituksen ja pakottaa uuden moottorin
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Päivitetty uuteen versioon 24
        
    - name: Install dependencies
      run: npm install

    - name: Run data fetch script
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        CHANNEL_ID_1: ${{ secrets.CHANNEL_ID_1 }}
        CHANNEL_ID_2: ${{ secrets.CHANNEL_ID_2 }}
      run: node index.js

    - name: Commit and Push changes
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'bot@users.noreply.github.com'
        git add top20_songs.json
        git commit -m "Automaattinen listan päivitys" || exit 0
        git push
